<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>평택 마피아 게임</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>🎭 마피아 게임</h1>
        
        <div id="gameSetup" class="game-section">
            <h2>게임 설정</h2>
            <div class="input-group">
                <label for="playerCount">플레이어 수:</label>
                <input type="number" id="playerCount" min="5" max="20" value="8">
            </div>
            <div class="input-group">
                <label for="playerNames">플레이어 이름 (쉼표로 구분):</label>
                <textarea id="playerNames" rows="4" placeholder="이름1, 이름2, 이름3..."></textarea>
            </div>
            <button id="startBtn" class="btn btn-primary">게임 시작</button>
        </div>

        <div id="gameBoard" class="game-section" style="display: none;">
            <h2>게임 진행 중</h2>
            <div id="gameStatus" class="status-box"></div>
            <div id="playerList" class="player-list"></div>
            <div id="actionPanel" class="action-panel"></div>
            <button id="nextPhaseBtn" class="btn btn-primary">다음 단계</button>
        </div>

        <div id="gameEnd" class="game-section" style="display: none;">
            <h2>게임 종료</h2>
            <div id="resultMessage" class="result-box"></div>
            <button id="restartBtn" class="btn btn-primary">새 게임 시작</button>
        </div>
    </div>

    <script src="ui-manager.js"></script>
    <script src="mafia-game-complete.js"></script>
</body>
</html>
